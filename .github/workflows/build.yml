name: Build Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
    
    name: ${{ matrix.name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2

    - name: Setup Vulkan SDK
      uses: NcStudios/VulkanCI@v1.0
    
    - name: Configure CMake
      run: cmake -S . -B build
    
    - name: Build
      run: cmake --build build